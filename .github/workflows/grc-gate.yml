# grc-gate: run the GCP compliance policy gate on every pull request to main.
# Three Rego namespaces enforced: SC-28 (encryption), AC-3 (public access), CM-6 (labels).
# Evidence is bundled, hashed, and Cosign-signed on every run, pass or fail, then uploaded.
# The pass/fail decision is the LAST step so a failing gate never skips signing --
# a failed run is exactly the evidence worth preserving.
name: grc-gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write   # required for Cosign to mint its OIDC token

jobs:
  grc-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Conftest
        env:
          CONFTEST_VERSION: "0.57.0"
        run: |
          curl -fsSL \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | tar xzf - conftest
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Run policy gate
        id: gate
        run: |
          mkdir -p evidence
          set +e
          conftest test week-1/evidence/plan.json \
            --policy week-2/policies \
            --namespace compliance.ac3_gcp \
            --namespace compliance.cm6_gcp \
            --namespace compliance.sc28_gcp \
            --output json > evidence/conftest-results.json
          echo "gate_exit=$?" >> "$GITHUB_OUTPUT"
          set -e
          cat evidence/conftest-results.json

      - name: Bundle evidence
        if: always()
        run: tar czf evidence.tar.gz evidence/

      - name: Hash evidence bundle
        if: always()
        run: sha256sum evidence.tar.gz > evidence.tar.gz.sha256

      - name: Sign evidence bundle (Cosign keyless)
        if: always()
        run: |
          cosign sign-blob --yes \
            --bundle evidence.tar.gz.sig.bundle \
            evidence.tar.gz

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conftest-evidence
          path: |
            evidence/
            evidence.tar.gz
            evidence.tar.gz.sha256
            evidence.tar.gz.sig.bundle

      - name: Enforce gate result
        if: always()
        run: |
          echo "Policy gate exit code: ${{ steps.gate.outputs.gate_exit }}"
          exit ${{ steps.gate.outputs.gate_exit }}
